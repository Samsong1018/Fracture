<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#b4befe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="180" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#313244" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="45" x2="720" y2="45"/>
    <line x1="0" y1="90" x2="720" y2="90"/>
    <line x1="0" y1="135" x2="720" y2="135"/>
    <line x1="180" y1="0" x2="180" y2="180"/>
    <line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="540" y1="0" x2="540" y2="180"/>
  </g>

  <!-- Fracture icon — left side -->
  <!-- Shield base -->
  <path d="M 68 28 L 92 28 L 92 48 Q 92 72 80 82 Q 68 72 68 48 Z"
        fill="none" stroke="#45475a" stroke-width="1.5"/>
  <!-- Crack lines through the shield -->
  <polyline points="80,28 74,52 82,58 72,82"
            fill="none" stroke="url(#textGrad)" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#glow)"/>
  <polyline points="74,52 68,56"
            fill="none" stroke="#89b4fa" stroke-width="1.5"
            stroke-linecap="round" opacity="0.7"/>
  <polyline points="82,58 90,60"
            fill="none" stroke="#89b4fa" stroke-width="1.5"
            stroke-linecap="round" opacity="0.7"/>
  <!-- Small fragment dots -->
  <circle cx="70" cy="46" r="1.5" fill="#cba6f7" opacity="0.6"/>
  <circle cx="90" cy="62" r="1.5" fill="#89b4fa" opacity="0.6"/>
  <circle cx="76" cy="76" r="1"   fill="#b4befe" opacity="0.5"/>

  <!-- FRACTURE wordmark -->
  <text x="118" y="112"
        font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="64"
        font-weight="700"
        letter-spacing="6"
        fill="url(#textGrad)"
        filter="url(#subtleGlow)">FRACTURE</text>

  <!-- Tagline -->
  <text x="120" y="140"
        font-family="'Segoe UI', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="14"
        font-weight="400"
        letter-spacing="3"
        fill="#6c7086">OPEN SOURCE WEB PENTESTING SUITE</text>

  <!-- Accent line under wordmark -->
  <line x1="118" y1="148" x2="660" y2="148"
        stroke="#313244" stroke-width="1" opacity="0.6"/>

  <!-- Corner accent dots -->
  <circle cx="16" cy="16" r="3" fill="#89b4fa" opacity="0.4"/>
  <circle cx="704" cy="16" r="3" fill="#cba6f7" opacity="0.4"/>
  <circle cx="16" cy="164" r="3" fill="#a6e3a1" opacity="0.4"/>
  <circle cx="704" cy="164" r="3" fill="#89b4fa" opacity="0.4"/>
</svg>
